<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniguez Portfolio</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>
            <a href="index.html">II<span class="expand">niguez</span></a>
        </h1>
        <nav>
            <a href="index.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="certs.html">Certificates</a>
        </nav>
    </header>
    <main>
    <h1 class="pageheader-h1" id="project-title"></h1>
    <div id="project-summary" class="main-left">
        <!-- Brief summary will be inserted here -->
    </div>
    <div class="main-flex" id="project-content">
        <!-- Project HTML will be loaded here -->
    </div>
</main>
    <footer>
        2025 Iniguez Isabella
    </footer>
    <script src="assets/js/projectsData.js"></script>

    <script>
    // Get query parameters
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || 'Project';
    const file = params.get('file');

    // Set project name
    document.getElementById('project-title').textContent = name;

    // Helper to set summary text
    function setSummary(text) {
        const summaryDiv = document.getElementById('project-summary');
        if (!text) {
            summaryDiv.style.display = 'none';
            return;
        }
        summaryDiv.style.display = 'block';
        // Assume text is safe HTML (no escaping needed)
        summaryDiv.innerHTML = `<h2>Summary</h2>${text}`;
    }

    // Determine summary from (1) URL param, (2) projectsData.js, (3) fetched project file
    let summaryFound = false;
    const summaryParam = params.get('summary');
    if (summaryParam) {
        setSummary(decodeURIComponent(summaryParam));
        summaryFound = true;
    } else if (typeof projects !== 'undefined') {
        // Try to find project by name in projectsData
        const proj = projects.find(p => p.name === name || decodeURIComponent(p.name) === name);
        if (proj && proj.summary) {
            setSummary(proj.summary);
            summaryFound = true;
        }
    }

    // Load project HTML if file param exists
    if (file) {
        // If no explicit or data-driven summary, attempt to fetch the project file and extract a first paragraph
        if (!summaryFound) {
            fetch(file).then(resp => {
                if (!resp.ok) throw new Error('Fetch failed');
                return resp.text();
            }).then(htmlText => {
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');
                    const descEl = doc.querySelector('.project-desc') || doc.querySelector('p');
                    const text = descEl ? descEl.textContent.trim() : '';
                    setSummary(text);
                } catch (e) {
                    setSummary('');
                }
            }).catch(() => setSummary(''));
        }

        const iframe = document.createElement('iframe');
        iframe.src = file;
        iframe.width = "100%";
        iframe.height = "600";
        iframe.style.border = "none";
        document.getElementById('project-content').appendChild(iframe);
    } else {
        document.getElementById('project-content').textContent = "No project file specified.";
    }
    </script>
</body>
</html>
